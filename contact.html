<html lang="en">

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LNK Pharmacy Solutions — Contact</title>
  <link rel="stylesheet" href="fonts/figtree.css">
  <link rel="stylesheet" href="colors_and_type.css">
  <link rel="stylesheet" href="mobile.css">
  <style>
    html, body { margin: 0; padding: 0; }
    body {
      font-family: "Figtree", system-ui, sans-serif;
      background: #FAF8F4;
      color: #1A1A1A;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    #root { min-height: 100vh; }
    a { color: inherit; }
    ::selection { background: rgba(20,184,166,0.22); }
    input, select, textarea { font-family: inherit; }
    textarea { resize: vertical; min-height: 100px; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <meta name="ext-resource-dependency" content="assets/logo-dark-context.svg">
  <meta name="ext-resource-dependency" content="assets/logo-light-context.svg">
</head>
<body>
  
  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
      <rect width="400" height="400" fill="#1E2F4A"/>
      <g transform="translate(200 210)">
        <path d="M -80 60 Q -82 58 -78 55 L -18 -68 Q -15 -74 -12 -70 L 70 58 Q 72 61 68 62 L -75 61 Q -79 61 -80 60 Z"
              fill="none" stroke="#5DCAA5" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
        <path d="M -14 -62 L 64 58" fill="none" stroke="#5DCAA5" stroke-width="1.8" opacity=".5"/>
      </g>
      <text x="200" y="340" text-anchor="middle" font-family="Figtree, system-ui, sans-serif" font-size="22" font-weight="500" fill="#FAF8F4" letter-spacing="0.5">LNK · Contact</text>
    </svg>
  </template>
  <div id="root"></div>

  <script type="text/babel" data-presets="react" src="components/Button.jsx"></script>
  <script type="text/babel" data-presets="react" src="components/Header.jsx"></script>
  <script type="text/babel" data-presets="react" src="components/Footer.jsx"></script>
  <script type="text/babel" data-presets="react" src="components/ContactIntake.jsx"></script>

  <script type="text/babel" data-presets="react">
    // Pick the initial lane from query string (?lane=provider)
    const params = new URLSearchParams(window.location.search);
    const initialLane = params.get('lane') || 'provider';

    const ContactPage = () => {
      const go = (r) => {
        if (r === 'home') { window.location.href = '/'; return; }
        if (r === 'providers') { window.location.href = '/providers'; return; }
        if (r === 'patients') { window.location.href = '/patients'; return; }
        if (r === 'health-systems') { window.location.href = '/health-systems'; return; }
      };

      return (
        <div data-screen-label="04 Contact">
          <Header context="dark" current="contact" onNavigate={go} />

          {/* Hero */}
          <section style={{ background: '#FAF8F4', padding: '88px 24px 32px' }}>
            <div style={{ maxWidth: 1100, margin: '0 auto' }}>
              <div style={{
                fontSize: 12, fontWeight: 500, letterSpacing: '0.08em',
                textTransform: 'uppercase', color: '#0E8F81', marginBottom: 16,
              }}>Contact</div>
              <h1 style={{
                margin: 0, fontSize: 56, fontWeight: 500, letterSpacing: '-0.025em',
                color: '#1E2F4A', lineHeight: 1.05, textWrap: 'balance',
                maxWidth: 880,
              }}>Tell us who you are — we'll tell you how we can help.</h1>
            </div>
          </section>

          <ContactIntake initialLane={initialLane} />

          <ContactDetails />

          <Footer onNavigate={go} />
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<ContactPage />);
  </script>
</body>
</html>
