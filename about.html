  <meta charset="utf-8">

  <style>
    html, body { margin: 0; padding: 0; }
    body {
      font-family: "Figtree", system-ui, sans-serif;

    a { color: inherit; }

  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

  <meta name="ext-resource-dependency" content="assets/logo-dark-context.svg">
  <meta name="ext-resource-dependency" content="assets/logo-light-context.svg">
  <meta name="ext-resource-dependency" content="assets/team/abe-karimi.jpg">
  <meta name="ext-resource-dependency" content="assets/team/thomas-johnson.jpg">
</head>
<body>

  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
      <rect width="400" height="400" fill="#1E2F4A"/>
      <g transform="translate(200 210)">
        <path d="M -80 60 Q -82 58 -78 55 L -18 -68 Q -15 -74 -12 -70 L 70 58 Q 72 61 68 62 L -75 61 Q -79 61 -80 60 Z"
              fill="none" stroke="#5DCAA5" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
        <path d="M -14 -62 L 64 58" fill="none" stroke="#5DCAA5" stroke-width="1.8" opacity=".5"/>
      </g>
      <text x="200" y="340" text-anchor="middle" font-family="Figtree, system-ui, sans-serif" font-size="22" font-weight="500" fill="#FAF8F4" letter-spacing="0.5">LNK · About</text>
    </svg>
  </template>
  <div id="root"></div>

  <!-- Primitives -->
  <script type="text/babel" data-presets="react" src="components/Button.jsx"></script>
  <script type="text/babel" data-presets="react" src="components/Header.jsx"></script>
  <script type="text/babel" data-presets="react" src="components/Footer.jsx"></script>
  <script type="text/babel" data-presets="react" src="components/CtaBlock.jsx"></script>

  <!-- About-specific blocks -->
  <script type="text/babel" data-presets="react" src="components/AboutHero.jsx"></script>
  <script type="text/babel" data-presets="react" src="components/AboutOrigin.jsx"></script>
  <script type="text/babel" data-presets="react" src="components/AboutFounders.jsx"></script>
  <script type="text/babel" data-presets="react" src="components/AboutPrinciples.jsx"></script>

  <script type="text/babel" data-presets="react">
    const AboutPage = () => {
      const go = (r) => {
        if (r === 'home') { window.location.href = 'Homepage.html'; return; }
        if (r === 'patients') { window.location.href = 'Patients.html'; return; }
        if (r === 'providers') { window.location.href = 'Providers.html'; return; }
        if (r === 'health-systems') { window.location.href = 'Health Systems.html'; return; }
        if (r === 'contact') { window.location.href = 'Contact.html'; return; }
        if (r === 'about') { window.scrollTo({ top: 0, behavior: 'smooth' }); return; }
      };

      return (
        <div data-screen-label="06 About">
          <Header context="dark" current="about" onNavigate={go} />

          {/* 1. Hero — conviction, two-sides framing */}
          <AboutHero />

          {/* 2. Why we exist — origin narrative */}
          <AboutOrigin />

          {/* 3. Founders — Abe and Thomas, large editorial cards */}
          <AboutFounders />

          {/* 4. What we stand for — operating principles */}
          <AboutPrinciples />

          {/* 5. Closing CTA */}
          <CtaBlock
            eyebrow="Want to talk?"
            headline="The conversation that starts every partnership."
            note="Whether you're a clinic, a system, or a patient looking for help — the next step is a real conversation with one of us."
            primaryCta={{ label: 'Get in touch', onClick: () => go('contact') }}
            secondaryCta={{ label: 'Back to home', onClick: () => go('home') }}
          />

          <Footer onNavigate={go} />
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<AboutPage />);
  </script>
</body>
</html>
