  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LNK Pharmacy Solutions — For health systems & ACOs</title>
  <link rel="stylesheet" href="fonts/figtree.css">
  <link rel="stylesheet" href="colors_and_type.css">
  <style>
    html, body { margin: 0; padding: 0; }
    body {
      font-family: "Figtree", system-ui, sans-serif;
      background: #FAF8F4;
      color: #1A1A1A;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    #root { min-height: 100vh; }
    a { color: inherit; }
    ::selection { background: rgba(20,184,166,0.22); }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <meta name="ext-resource-dependency" content="assets/logo-dark-context.svg">
  <meta name="ext-resource-dependency" content="assets/logo-light-context.svg">
</head>
<body>
  
  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
      <rect width="400" height="400" fill="#1E2F4A"/>
      <g transform="translate(200 210)">
        <path d="M -80 60 Q -82 58 -78 55 L -18 -68 Q -15 -74 -12 -70 L 70 58 Q 72 61 68 62 L -75 61 Q -79 61 -80 60 Z"
              fill="none" stroke="#5DCAA5" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
        <path d="M -14 -62 L 64 58" fill="none" stroke="#5DCAA5" stroke-width="1.8" opacity=".5"/>
      </g>
      <text x="200" y="340" text-anchor="middle" font-family="Figtree, system-ui, sans-serif" font-size="22" font-weight="500" fill="#FAF8F4" letter-spacing="0.5">LNK · Health Systems</text>
    </svg>
  </template>
  <div id="root"></div>

  <!-- Primitives -->
  <script type="text/babel" data-presets="react" src="components/Button.jsx"></script>
  <script type="text/babel" data-presets="react" src="components/Header.jsx"></script>
  <script type="text/babel" data-presets="react" src="components/Footer.jsx"></script>
  <script type="text/babel" data-presets="react" src="components/CtaBlock.jsx"></script>

  <!-- Health-system specific blocks -->
  <script type="text/babel" data-presets="react" src="components/HealthSystemHero.jsx"></script>
  <script type="text/babel" data-presets="react" src="components/OutcomeLevers.jsx"></script>
  <script type="text/babel" data-presets="react" src="components/WorkflowRigor.jsx"></script>
  <script type="text/babel" data-presets="react" src="components/FinancialCase.jsx"></script>
  <script type="text/babel" data-presets="react" src="components/PriorityCaseStudy.jsx"></script>
  <script type="text/babel" data-presets="react" src="components/IntegrationBand.jsx"></script>

  <script type="text/babel" data-presets="react">
    const HealthSystemsPage = () => {
      const go = (r) => {
        if (r === 'home') { window.location.href = 'index.html'; return; }
        if (r === 'contact') { window.location.href = 'contact.html?lane=system'; return; }
        if (r === 'providers') { window.location.href = 'providers.html'; return; }
        if (r === 'patients') { window.location.href = 'patients.html'; return; }
        if (r === 'about') { window.location.href = 'about.html'; return; }
        if (r === 'health-systems') { window.scrollTo({ top: 0, behavior: 'smooth' }); return; }
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      return (
        <div data-screen-label="04 Health Systems">
          <Header context="dark" current="health-systems" onNavigate={go} />

          {/* 1. HERO — navy editorial, lede = 9,000 cases */}
          <HealthSystemHero onSelect={go} />

          {/* 2. FOUR STRATEGIC LEVERS — revenue / risk / quality / capacity */}
          <OutcomeLevers />

          {/* 3. WORKFLOW RIGOR — how we scale without accuracy loss */}
          <WorkflowRigor />

          {/* 4. PARTNER PROOF — Pioneer Heart case study */}
          <PriorityCaseStudy />

          {/* 5. FINANCIAL CASE — how it pays + pilot → scale */}
          <FinancialCase />

          {/* 6. INTEGRATION — how we slot in without disruption */}
          <IntegrationBand />

          {/* 7. CLOSING CTA */}
          <CtaBlock
            eyebrow="Next step"
            headline="One conversation to see whether the economics work for your system."
            note="Book a 30-minute strategy session with our founders. We'll walk through your service lines, your contracts, and where a pharmacist-led layer most likely pays first."
            primaryCta={{ label: 'Book a strategy session', onClick: () => go('contact') }}
            secondaryCta={{ label: 'Back to home', onClick: () => go('home') }}
          />

          <Footer onNavigate={go} />
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<HealthSystemsPage />);
  </script>
</body>
</html>
