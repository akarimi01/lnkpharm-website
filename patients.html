<html lang="en">
<head>

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LNK Pharmacy Solutions — For patients</title>
  <link rel="stylesheet" href="fonts/figtree.css">
  <link rel="stylesheet" href="colors_and_type.css">
  <link rel="stylesheet" href="mobile.css">
  <style>
    html, body { margin: 0; padding: 0; }
    body {
      font-family: "Figtree", system-ui, sans-serif;
      background: #FAF8F4;
      color: #1A1A1A;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    #root { min-height: 100vh; }
    a { color: inherit; }
    ::selection { background: rgba(232,113,10,0.18); }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <meta name="ext-resource-dependency" content="assets/logo-dark-context.svg">
  <meta name="ext-resource-dependency" content="assets/logo-light-context.svg">
</head>
<body>
  
  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
      <rect width="400" height="400" fill="#1E2F4A"/>
      <g transform="translate(200 210)">
        <path d="M -80 60 Q -82 58 -78 55 L -18 -68 Q -15 -74 -12 -70 L 70 58 Q 72 61 68 62 L -75 61 Q -79 61 -80 60 Z"
              fill="none" stroke="#5DCAA5" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
        <path d="M -14 -62 L 64 58" fill="none" stroke="#5DCAA5" stroke-width="1.8" opacity=".5"/>
      </g>
      <text x="200" y="340" text-anchor="middle" font-family="Figtree, system-ui, sans-serif" font-size="22" font-weight="500" fill="#FAF8F4" letter-spacing="0.5">LNK · Patients</text>
    </svg>
  </template>
  <div id="root"></div>

  <!-- Primitives -->
  <script type="text/babel" data-presets="react" src="components/Button.jsx"></script>
  <script type="text/babel" data-presets="react" src="components/Header.jsx"></script>
  <script type="text/babel" data-presets="react" src="components/Footer.jsx"></script>
  <script type="text/babel" data-presets="react" src="components/ArcSteps.jsx"></script>
  <script type="text/babel" data-presets="react" src="components/CtaBlock.jsx"></script>

  <!-- Patient-specific blocks -->
  <script type="text/babel" data-presets="react" src="components/PatientHero.jsx"></script>
  <script type="text/babel" data-presets="react" src="components/HowWeHelpYou.jsx"></script>
  <script type="text/babel" data-presets="react" src="components/PatientStory.jsx"></script>
  <script type="text/babel" data-presets="react" src="components/PatientSections.jsx"></script>

  <script type="text/babel" data-presets="react">
    const PatientsPage = () => {
      const go = (r) => {
        if (r === 'home') { window.location.href = 'index.html'; return; }
        if (r === 'providers') { window.location.href = 'providers.html'; return; }
        if (r === 'health-systems') { window.location.href = 'health-systems.html'; return; }
        if (r === 'contact') { window.location.href = 'contact.html'; return; }
        if (r === 'about') { window.location.href = 'about.html'; return; }
      };
      return (
        <div data-screen-label="05 Patients">
          <Header context="dark" current="patients" onNavigate={go} />

          {/* 1. Hero — warm canvas, patient voice */}
          <PatientHero />

          {/* 2. How we help you — the four pain-point blocks */}
          <HowWeHelpYou />

          {/* 3. Featured patient story — editorial long-form */}
          <PatientStory />

          {/* 4. Listen / Investigate / Solve / Stay — arc reused */}
          <ArcSteps variant="light" />

          {/* 5. What we actually do — plain-language checklist */}
          <PatientWhatWeDo />

          {/* 6. How to get LNK through your provider — navy anchor */}
          <PatientPartnership />

          {/* 7. FAQ */}
          <PatientFAQ />

          {/* 8. Closing CTA — warm, not pushy */}
          <CtaBlock
            eyebrow="Next step"
            headline="Talk to your doctor's office about LNK."
            note="We work best when we partner with your provider — that's how we get access to your full story and coordinate with your entire care team."
            primaryCta={{ label: 'See how we work with providers', onClick: () => go('providers') }}
            secondaryCta={{ label: 'Already a patient? Contact us', onClick: () => go('contact') }}
          />

          <Footer onNavigate={go} />
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<PatientsPage />);
  </script>
</body>
</html>
